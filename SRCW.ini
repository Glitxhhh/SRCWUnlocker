; SRCW Unlocker Config (Reflection Build)
; 1=enable, 0=disable — changes on next launch

; --- General ---
Console 0
ClearOnly 0
PhaseDelayMs 500

; --- Trigger ---
; HotkeyEnabled 0 = autorun on menu load (default)
; HotkeyEnabled 1 = wait for hotkey press
HotkeyEnabled 0
; 192=~, 120=F9, 45=Insert
UnlockKey 192

; RemovalMode 0 (default) = anything disabled below is left untouched (skipped)
; RemovalMode 1 = anything disabled below is actively re-locked in save data,
;   wherever the game exposes a lock function for that category (currently: Gadgets only).
;   Categories without a lock primitive will just be skipped and a notice logged.
RemovalMode 0

; --- DLC Gate Removal ---
ClearCharaDLC 1
ClearMachineDLC 1
ClearHonorDLC 1
ClearAlbumDLC 1
ClearStickerDLC 1

; --- Save Data Unlocks (category master switches) ---
; Each of these can be fine-tuned per-ID with the [Drivers]/[HonorTitles]/[Albums]/
; [Tracks]/[ColorPresets]/[Gadgets] sections below. An ID not listed in its section
; falls back to the master switch here, so new content from a future update still
; auto-unlocks unless you explicitly pin it.
HonorTitles 1
Drivers 1
MachineCustomize 1
ColorPresets 1
MirrorSpeed 1
Music 1
Gadgets 1
GadgetPlate 1
Challenges 1

; --- Optional (OFF by default) ---
; WARNING: Achievements will permanently unlock on Steam
Achievements 0
; Super Sonic selectable + Fever mode in Race Park/Time Trial
SuperSonicAll 1

; --- Stage Unlocks ---
StagesDLC 1
StagesGPOpen 1
StagesSecret 1

; --- New Flag Clearing ---
NF_CompleteMachine 1
NF_Sticker 1
NF_ColorPreset 1
NF_Gadget 1
NF_PartsSpeed 1
NF_PartsAccel 1
NF_PartsHandle 1
NF_PartsPower 1
NF_PartsDash 1
NF_Horn 1
NF_HonorTitles 1
NF_Jukebox 1
NF_Challenges 1
NF_Rewards 1

; --- Per-item overrides (optional, sparse) ---
; Format: <key> <0 or 1>, one per line.
; [Drivers]/[ColorPresets]/[Gadgets] keys may be the enum name (e.g. Axel) OR a
; numeric ID -- names are resolved against the running game, so this works for
; content added by future updates without needing a new DLL build.
; [HonorTitles]/[Albums]/[Tracks] only support numeric IDs (no names exposed).
;
; Example to unlock ONLY Axel and lock every other driver:
;   Drivers 0
;   [Drivers]
;   Axel 1
;
; RemovalMode 1 will actively re-lock anything disabled here, but only for
; categories the game exposes a real lock primitive for: Drivers, Albums,
; Tracks, HonorTitles, and Gadgets. ColorPresets has no safe lock path yet,
; so disabling a color preset there only skips it -- it will not be removed
; from an existing save.
[Drivers]

[HonorTitles]

[Albums]

[Tracks]

[ColorPresets]

[Gadgets]
